name: Pull Request

on:
    pull_request:
        branches:
            - 'master'
            - 'contrib/**'

jobs:
    build-test-check:
        name: Build, Test , spotless
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: 1. Spotless Formatierungs-Check
              run: ./gradlew :dungeon:spotlessCheck

            - name: 2. Build und Test (Nur Dungeon)
              run: ./gradlew :dungeon:assemble :dungeon:test
