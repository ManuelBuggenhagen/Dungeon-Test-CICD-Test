name: Dungeon Build und Test

on:
    pull_request:
    workflow_dispatch:

jobs:
    build-dungeon:
        name: Build und Test Dungeon
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Build und Test (Dungeon)
              run: ./gradlew :dungeon:assemble :dungeon:test
